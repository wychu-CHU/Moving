<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>走動的圖形 V2 - 視藝大師</title>
    <style>
        /* --- 全局設定 --- */
        body {
            margin: 0; padding: 0;
            background-color: #222; color: #FFF;
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            overflow: hidden; user-select: none;
            display: flex; flex-direction: column; height: 100vh;
        }

        .screen { display: none; width: 100%; height: 100%; position: relative; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        /* --- 主選單 --- */
        #menu h1 { color: #FFD700; font-size: 4rem; margin-bottom: 20px; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .btn-start {
            font-size: 2.5rem; padding: 20px 60px; border-radius: 50px;
            background: linear-gradient(45deg, #00C6FF, #0072FF);
            color: #FFF; border: none; cursor: pointer; font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: transform 0.2s;
        }

        /* --- 遊戲區佈局 --- */
        #game-screen { flex-direction: row; background: #000; }

        /* 左側工具列 */
        #toolbar {
            width: 280px; height: 100%; background: #1a1a1a;
            border-right: 3px solid #333; display: flex; flex-direction: column;
            padding: 15px; box-sizing: border-box; overflow-y: auto; z-index: 100;
        }
        
        .tool-section { margin-bottom: 20px; padding: 10px; background: #252525; border-radius: 10px; }
        .tool-title { font-size: 1.2rem; color: #00FFFF; margin-bottom: 10px; font-weight: bold; }
        
        /* 顏色與形狀網格 */
        .grid-layout { display: flex; flex-wrap: wrap; gap: 10px; }
        .color-btn { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-btn.selected { border-color: #FFF; box-shadow: 0 0 10px #FFF; transform: scale(1.1); }

        .shape-btn {
            width: 50px; height: 50px; background: #444; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            border: 2px solid transparent; border-radius: 8px;
        }
        .shape-btn.selected { border-color: #00FFFF; background: #555; transform: scale(1.1); }
        
        /* 設定大小滑桿 */
        .size-info { display: flex; justify-content: space-between; margin-bottom: 5px; color: #FFF; }
        input[type=range] { width: 100%; cursor: pointer; }

        /* 操作按鈕 */
        .action-btn {
            width: 100%; padding: 12px; margin-bottom: 10px; font-size: 1.1rem;
            font-weight: bold; cursor: pointer; border-radius: 8px; border: none; color: #FFF;
        }
        .btn-walk { background: #8A2BE2; }
        .btn-delete-mode { background: #555; border: 2px solid transparent; }
        .btn-delete-mode.active-mode { background: #FF3B30; border-color: #FFF; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.7; } }

        /* --- 畫布區 --- */
        #canvas-area { flex-grow: 1; height: 100%; position: relative; overflow: hidden; cursor: crosshair; }

        /* --- 圖形 CSS --- */
        .art-shape { position: absolute; cursor: grab; transition: outline 0.2s; }
        .art-shape:hover { outline: 2px dashed #FFF; }
        
        /* 各種形狀的 Clip-Path */
        .shape-star { clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
        .shape-heart { background-color: transparent !important; } /* Heart 使用 pseudo-element */
        .shape-heart::before, .shape-heart::after {
            content: ""; position: absolute; width: 50%; height: 80%;
            background: inherit; border-radius: 50% 50% 0 0;
        }
        .shape-heart::before { left: 50%; transform: rotate(-45deg); transform-origin: 0 100%; }
        .shape-heart::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }
        
        .shape-diamond { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        .shape-hexagon { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }
        .shape-triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }

        /* --- 動畫 --- */
        .anim-walk-1 { animation: walk1 4s infinite alternate ease-in-out; }
        .anim-walk-2 { animation: walk2 3s infinite alternate ease-in-out; }
        .anim-walk-3 { animation: walk3 5s infinite linear; }
        @keyframes walk1 { 0% { transform: translate(0,0) rotate(0deg); } 100% { transform: translate(50px, -50px) rotate(30deg); } }
        @keyframes walk2 { 0% { transform: scale(1); } 100% { transform: scale(1.3) translate(-30px, 20px); } }
        @keyframes walk3 { 0% { transform: rotate(0deg) translateX(30px) rotate(0deg); } 100% { transform: rotate(360deg) translateX(30px) rotate(-360deg); } }

        /* 圖形選單中的小圖示 */
        .icon { width: 30px; height: 30px; background: #FFF; pointer-events: none; }
    </style>
</head>
<body>

    <div id="menu" class="screen active">
        <h1>走動的圖形 V2</h1>
        <button class="btn-start" onclick="startGame()">開始創作</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="toolbar">
            <div class="tool-section">
                <div class="tool-title">1. 調較大小</div>
                <div class="size-info"><span>小</span><span id="sizeVal">80px</span><span>大</span></div>
                <input type="range" id="sizeSlider" min="20" max="200" value="80" oninput="document.getElementById('sizeVal').innerText=this.value+'px'">
            </div>

            <div class="tool-section">
                <div class="tool-title">2. 選顏色</div>
                <div class="grid-layout">
                    <div class="color-btn selected" style="background: #FF3B30;" onclick="setColor('#FF3B30', this)"></div>
                    <div class="color-btn" style="background: #FFCC00;" onclick="setColor('#FFCC00', this)"></div>
                    <div class="color-btn" style="background: #4CD964;" onclick="setColor('#4CD964', this)"></div>
                    <div class="color-btn" style="background: #34AADC;" onclick="setColor('#34AADC', this)"></div>
                    <div class="color-btn" style="background: #FFFFFF;" onclick="setColor('#FFFFFF', this)"></div>
                    <div class="color-btn" style="background: #FF69B4;" onclick="setColor('#FF69B4', this)"></div>
                    <div class="color-btn" style="background: #AF52DE;" onclick="setColor('#AF52DE', this)"></div>
                    <div class="color-btn" style="background: #FF9500;" onclick="setColor('#FF9500', this)"></div>
                </div>
            </div>

            <div class="tool-section">
                <div class="tool-title">3. 選形狀</div>
                <div class="grid-layout">
                    <div class="shape-btn selected" onclick="setShape('circle', this)"><div class="icon" style="border-radius:50%"></div></div>
                    <div class="shape-btn" onclick="setShape('square', this)"><div class="icon"></div></div>
                    <div class="shape-btn" onclick="setShape('triangle', this)"><div class="icon" style="clip-path:polygon(50% 0%, 0% 100%, 100% 100%)"></div></div>
                    <div class="shape-btn" onclick="setShape('star', this)"><div class="icon shape-star"></div></div>
                    <div class="shape-btn" onclick="setShape('heart', this)"><div class="icon" style="background:red; clip-path: circle(40%);">❤️</div></div>
                    <div class="shape-btn" onclick="setShape('diamond', this)"><div class="icon shape-diamond"></div></div>
                    <div class="shape-btn" onclick="setShape('hexagon', this)"><div class="icon shape-hexagon"></div></div>
                    <div class="shape-btn" onclick="setShape('oval', this)"><div class="icon" style="width:35px; height:20px; border-radius:50%"></div></div>
                </div>
            </div>

            <button class="action-btn btn-walk" id="walkBtn" onclick="toggleWalk()">✨ 讓圖形走動 ✨</button>
            <button class="action-btn btn-delete-mode" id="deleteBtn" onclick="toggleDeleteMode()">🧽 刪除模式: 關</button>
            <button class="action-btn" style="background:#FF4500" onclick="clearCanvas()">🗑️ 全部清除</button>
            <button class="action-btn" style="background:#555" onclick="goHome()">🏠 回主選單</button>
        </div>

        <div id="canvas-area" onclick="handleCanvasClick(event)"></div>
    </div>

    <script>
        let currentColor = '#FF3B30';
        let currentShape = 'circle';
        let isWalking = false;
        let isDeleteMode = false;
        let draggedElement = null;
        let offsetX, offsetY;

        function startGame() {
            document.getElementById('menu').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
        }

        function goHome() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('menu').classList.add('active');
        }

        function setColor(color, btnEl) {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
            btnEl.classList.add('selected');
        }

        function setShape(shape, btnEl) {
            currentShape = shape;
            document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('selected'));
            btnEl.classList.add('selected');
        }

        function toggleDeleteMode() {
            isDeleteMode = !isDeleteMode;
            const btn = document.getElementById('deleteBtn');
            btn.innerText = isDeleteMode ? "🧽 點擊圖形刪除" : "🧽 刪除模式: 關";
            btn.classList.toggle('active-mode');
        }

        function handleCanvasClick(e) {
            // 如果點擊的是圖形
            if (e.target.classList.contains('art-shape')) {
                if (isDeleteMode) {
                    e.target.remove();
                }
                return;
            }
            if (isDeleteMode || draggedElement) return;

            // 新增圖形
            const size = parseInt(document.getElementById('sizeSlider').value);
            const canvas = document.getElementById('canvas-area');
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left - size/2;
            const y = e.clientY - rect.top - size/2;

            const el = document.createElement('div');
            el.className = `art-shape shape-${currentShape}`;
            el.style.width = size + 'px';
            el.style.height = (currentShape === 'oval') ? (size * 0.6) + 'px' : size + 'px';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.backgroundColor = currentColor;
            
            if (currentShape === 'circle' || currentShape === 'oval') el.style.borderRadius = '50%';

            if (isWalking) {
                const anims = ['anim-walk-1', 'anim-walk-2', 'anim-walk-3'];
                el.classList.add(anims[Math.floor(Math.random() * anims.length)]);
            }

            el.addEventListener('mousedown', dragStart);
            el.addEventListener('touchstart', dragStart, {passive: false});
            canvas.appendChild(el);
        }

        function toggleWalk() {
            isWalking = !isWalking;
            const btn = document.getElementById('walkBtn');
            const shapes = document.querySelectorAll('.art-shape');
            btn.innerText = isWalking ? "⏸️ 停止走動" : "✨ 讓圖形走動 ✨";
            btn.style.background = isWalking ? "#FF1493" : "#8A2BE2";

            shapes.forEach(shape => {
                if (isWalking) {
                    const anims = ['anim-walk-1', 'anim-walk-2', 'anim-walk-3'];
                    shape.classList.add(anims[Math.floor(Math.random() * anims.length)]);
                } else {
                    shape.classList.remove('anim-walk-1', 'anim-walk-2', 'anim-walk-3');
                }
            });
        }

        function clearCanvas() {
            if(confirm("確定要清除所有圖案嗎？")) {
                document.getElementById('canvas-area').innerHTML = '';
            }
        }

        // --- 拖曳邏輯 ---
        function dragStart(e) {
            if (isDeleteMode) return;
            e.stopPropagation();
            draggedElement = e.target;
            const rect = draggedElement.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            offsetX = clientX - rect.left;
            offsetY = clientY - rect.top;
            document.addEventListener('mousemove', dragMove);
            document.addEventListener('touchmove', dragMove, {passive:false});
            document.addEventListener('mouseup', dragEnd);
            document.addEventListener('touchend', dragEnd);
        }

        function dragMove(e) {
            if (!draggedElement) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const canvas = document.getElementById('canvas-area').getBoundingClientRect();
            draggedElement.style.left = (clientX - canvas.left - offsetX) + 'px';
            draggedElement.style.top = (clientY - canvas.top - offsetY) + 'px';
        }

        function dragEnd() {
            setTimeout(() => { draggedElement = null; }, 50);
            document.removeEventListener('mousemove', dragMove);
            document.removeEventListener('touchmove', dragMove);
        }
    </script>
</body>
</html>
